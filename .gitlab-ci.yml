stages:
  - test

variables:
  MYSQL_DATABASE: lab2_books
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_USER: root
  DB_PASSWORD: rootpass
  DB_NAME: lab2_books

test_with_mysql_and_migrations:
  stage: test
  image: python:3.11
  services:
    - name: mysql:8.0
      alias: mysql
  before_script:
    - apt-get update && apt-get install -y default-mysql-client
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - |
      for i in $(seq 1 60); do
        mysqladmin ping -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent && break
        echo "Waiting for MySQL to be ready..."
        sleep 2
      done
    - mysql -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS ${MYSQL_DATABASE};"
    - mysql -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -uroot -p"${MYSQL_ROOT_PASSWORD}" "${MYSQL_DATABASE}" < migrations/001_create_tables.sql
    - mysql -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -uroot -p"${MYSQL_ROOT_PASSWORD}" "${MYSQL_DATABASE}" < migrations/002_add_book_numeric_fields.sql
    - mysql -h"${MYSQL_HOST}" -P"${MYSQL_PORT}" -uroot -p"${MYSQL_ROOT_PASSWORD}" "${MYSQL_DATABASE}" < migrations/003_seed_books.sql
  script:
    - python -m pytest -q
