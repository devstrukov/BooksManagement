stages:
  - test

variables:
  POSTGRES_DB: lab2_books
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: lab2_books
  DB_SSLMODE: disable

test_with_postgres_and_migrations:
  stage: test
  image: python:3.11
  services:
    - name: postgres:16
      alias: postgres
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - |
      for i in $(seq 1 60); do
        PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "SELECT 1;" && break
        echo "Waiting for PostgreSQL to be ready..."
        sleep 2
      done
    - PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f migrations/001_create_tables.sql
    - PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f migrations/002_add_book_numeric_fields.sql
    - PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f migrations/003_seed_books.sql
  script:
    - python -m pytest -q
